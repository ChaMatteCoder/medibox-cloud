apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: medibox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: medibox/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          command: ["sh", "-c"]
          args:
            - alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000
          envFrom:
            - configMapRef:
                name: medibox-config
            - secretRef:
                name: medibox-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
