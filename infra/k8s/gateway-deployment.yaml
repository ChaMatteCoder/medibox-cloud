apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: medibox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx-gateway
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gateway-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: gateway-nginx-config
          configMap:
            name: gateway-nginx-config
