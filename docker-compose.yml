services:
  postgres:
    image: postgres:16-alpine
    container_name: medibox-postgres
    env_file:
      - .env.example
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medibox-rabbitmq
    env_file:
      - .env.example
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
    container_name: medibox-auth-service
    env_file:
      - .env.example
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  medication-service:
    build:
      context: ./services/medication-service
    container_name: medibox-medication-service
    env_file:
      - .env.example
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  event-service:
    build:
      context: ./services/event-service
    container_name: medibox-event-service
    env_file:
      - .env.example
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  notification-worker:
    build:
      context: ./services/notification-worker
    container_name: medibox-notification-worker
    env_file:
      - .env.example
    depends_on:
      rabbitmq:
        condition: service_healthy

  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: medibox-nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_started
      medication-service:
        condition: service_started
      event-service:
        condition: service_started

volumes:
  postgres_data:
