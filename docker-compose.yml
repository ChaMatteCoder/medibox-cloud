services:
  postgres:
    image: postgres:16-alpine
    container_name: medibox-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medibox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medibox}
      POSTGRES_DB: ${POSTGRES_DB:-medibox_cloud}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medibox} -d ${POSTGRES_DB:-medibox_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medibox-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-medibox}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-medibox}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
    container_name: medibox-auth-service
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://medibox:medibox@postgres:5432/medibox_cloud}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  medication-service:
    build:
      context: ./services/medication-service
    container_name: medibox-medication-service
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://medibox:medibox@postgres:5432/medibox_cloud}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  event-service:
    build:
      context: ./services/event-service
    container_name: medibox-event-service
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://medibox:medibox@postgres:5432/medibox_cloud}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://medibox:medibox@rabbitmq:5672/}
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  notification-worker:
    build:
      context: ./services/notification-worker
    container_name: medibox-notification-worker
    env_file:
      - .env.example
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://medibox:medibox@rabbitmq:5672/}
    depends_on:
      rabbitmq:
        condition: service_healthy

  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: medibox-nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_started
      medication-service:
        condition: service_started
      event-service:
        condition: service_started

volumes:
  postgres_data:
